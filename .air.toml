root = "."
tmp_dir = "tmp"

[build]
# cmd = "swag init -g main.go > /dev/null 2>&1 && go build -o tmp/main main.go"
cmd = "swag init -g main.go > /dev/null && go build -o tmp/main main.go"
bin = "tmp/main"
include_ext = ["go"]
exclude_dir = ["tmp", "docs"]
delay = 1000
stop_on_error = true

[log]
time = true
